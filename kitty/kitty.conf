# vim:fileencoding=utf-8:ft=conf

font_family JetBrainsMono Nerd Font Mono
italic_font auto
bold_font auto
bold_italic_font auto

font_size 15.0
modify_font cell_height 120%

shell_integration enabled no-cursor
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

scrollback_lines 2000
scrollback_pager less +G -R
wheel_scroll_multiplier 5.0
click_interval 0.5
select_by_word_characters :@-./_~?&=%+#
mouse_hide_wait 0.0
enabled_layouts *
remember_window_size yes
initial_window_width 640
initial_window_height 400
repaint_delay 10
input_delay 3
visual_bell_duration 0.0
enable_audio_bell yes
open_url_modifiers ctrl+shift
open_url_with default
term xterm-kitty
window_border_width 0
window_padding_width 12

# TAB STYLES
tab_bar_align left
tab_bar_style custom
tab_bar_min_tabs 1
tab_activity_symbol none
bell_on_tab no
tab_separator ""
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_title_template "{f'{title[:30]}…' if title.rindex(title[-1]) + 1 > 30 else (title.center(6) if (title.rindex(title[-1]) + 1) % 2 == 0 else title.center(5))}"
active_tab_font_style bold

# Clipboard
map super+v             paste_from_clipboard
map ctrl+shift+s        paste_from_selection
map super+c             copy_to_clipboard
map shift+insert        paste_from_selection

# Scrolling
map ctrl+shift+up        scroll_line_up
map ctrl+shift+down      scroll_line_down
map ctrl+shift+k         scroll_line_up
map ctrl+shift+j         scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home      scroll_home
map ctrl+shift+end       scroll_end
map ctrl+shift+h         show_scrollback

# Window management
map super+n             new_os_window
map super+w             close_window
map ctrl+shift+enter    new_window
map cmd+]        next_window
map cmd+[        previous_window
map alt+shift+f        move_window_forward
map alt+shift+b        move_window_backward
map alt+shift+`        move_window_to_top
map alt+shift+1        first_window
map alt+shift+2        second_window
map alt+shift+3        third_window
map alt+shift+4        fourth_window
map ctrl+shift+5        fifth_window
map ctrl+shift+6        sixth_window
map ctrl+shift+7        seventh_window
map ctrl+shift+8        eighth_window
map ctrl+shift+9        ninth_window
map ctrl+shift+0        tenth_window
map ctrl+. layout_action bias 50 62 70

# Tab management
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab
map ctrl+shift+t        new_tab
map ctrl+shift+q        close_tab
map ctrl+shift+l        next_layout
map ctrl+shift+.        move_tab_forward
map ctrl+shift+,        move_tab_backward
map cmd+shift+t         set_tab_title
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+0 goto_tab 10

# Miscellaneous
map ctrl+shift+up      increase_font_size
map ctrl+shift+down    decrease_font_size
map ctrl+shift+backspace restore_font_size

hide_window_decorations titlebar-only
macos_option_as_alt yes
allow_remote_control yes
listen_on unix:/tmp/kitty
startup_session startup.conf
action_alias theme kitten themes
map f10 launch --type=background /Users/jackson/.config/dotfiles/kitty/theme-switcher.sh

# BEGIN_KITTY_THEME
# Pencil Light
include current-theme.conf
# END_KITTY_THEME
